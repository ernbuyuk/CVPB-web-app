services:
  postgres:
    image: postgres:16-alpine
    container_name: cvpb-postgres
    environment:
      POSTGRES_DB: cvpb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cvpb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cvpb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cvpb_postgres_data:
